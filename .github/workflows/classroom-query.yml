name: Rust Classroom Query and Deploy Automation

on:
#   push:
#     branches: [ main, master ]
#   pull_request:
#     branches: [ main, master ]
#   schedule:
#     - cron: '0 */1 * * *'  # 每 1 小时运行一次
  workflow_dispatch:
    inputs:
      force_overwrite:
        description: 'Force overwrite existing data'
        required: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        
    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          rust-classroom-query/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-classroom-query/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build Rust project
      working-directory: rust-classroom-query
      run: cargo build --release
      
    - name: Run tests
      working-directory: rust-classroom-query
      run: cargo test
      
    - name: Fetch Classroom Data
      working-directory: rust-classroom-query
      env:
        YOUR_NEUQ_USERNAME: ${{ secrets.YOUR_NEUQ_USERNAME }}
        YOUR_NEUQ_PASSWORD: ${{ secrets.YOUR_NEUQ_PASSWORD }}
        ASSETS_DIR: ../assets
        OUTPUT_DIR: ./output
        FORCE_OVERWRITE: ${{ inputs.force_overwrite || 'false' }}
      run: ./target/release/neuq-classroom-query fetch
      
    - name: Process Data
      working-directory: rust-classroom-query
      env:
        ASSETS_DIR: ../assets
        OUTPUT_DIR: ./output
      run: ./target/release/neuq-classroom-query process
      
    - name: Generate HTML
      working-directory: rust-classroom-query
      env:
        ASSETS_DIR: ../assets
        OUTPUT_DIR: ./output
      run: ./target/release/neuq-classroom-query generate
      
    - name: Copy output files
      run: |
        cp rust-classroom-query/index.html . 2>/dev/null || true
        cp -r rust-classroom-query/output . 2>/dev/null || true
        
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
