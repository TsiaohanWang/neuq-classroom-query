# Ayu — Light (亮色) / Dark (暗色)
# 官方调色板: https://ayutheme.com/

name = "Ayu"

[light]
# 页面
page_bg = "#F8F9FA"
page_color = "#5C6166"
heading_color = "#22A4E6"
date_color = "#22A4E6"
# 横幅
banner_bg = "#EBEEF0"
banner_color = "#5C6166"
banner_close_color = "#828E9F"
banner_border = "#DFE1E5"
# 徽章
badge_bg = "#22A4E6"
badge_color = "#F8F9FA"
# 容器
container_bg = "rgba(248, 249, 250, 0.85)"
container_shadow = "0 4px 24px rgba(34, 164, 230, 0.06)"
container_border = "#DFE1E5"
# 信息框
infobox_bg = "#EBEEF0"
infobox_color = "#5C6166"
infobox_border = "#DFE1E5"
# 信息文本
info_color = "#828E9F"
# Tab 栏
tabbar_bg = "#EBEEF0"
tabbar_border = "#DFE1E5"
# Tab 按钮
tab_color = "#828E9F"
tab_hover_color = "#22A4E6"
tab_hover_bg = "#DFE1E5"
tab_active_bg = "#F8F9FA"
tab_active_color = "#22A4E6"
tab_active_border = "#22A4E6"
tab_border = "#DFE1E5"
# 日期切换按钮
date_btn_color = "#22A4E6"
date_btn_hover_bg = "#DFE1E5"
# 时段标题
timeslot_color = "#22A4E6"
# 表格
table_border = "#DFE1E5"
table_header_bg = "#EBEEF0"
table_header_color = "#5C6166"
floor_bg = "#DFE1E5"
floor_color = "#22A4E6"
building_bg = "#DFE1E5"
building_color = "#22A4E6"
# 折叠面板
collapsible_color = "#5C6166"
collapsible_border = "#DFE1E5"
collapsible_desc_color = "#828E9F"
collapsible_desc_border = "#DFE1E5"
# 主题控制按钮
theme_btn_color = "#828E9F"
theme_btn_hover_bg = "#DFE1E5"
theme_btn_border = "#DFE1E5"
theme_btn_hover_border = "#22A4E6"
theme_name_color = "#828E9F"
# 分割线
hr_border = "#DFE1E5"
# 链接
link_color = "#22A4E6"
# 数据单元格
data_color = "#5C6166"
data_bg = "rgba(34, 164, 230, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#86B300"
data_strong_bg = "rgba(134, 179, 0, 0.08)"
# 删除线 — Red
data_del_color = "#F07171"
data_del_decoration_color = "#F07171"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(240, 113, 113, 0.06)"
# 下划线 — Blue
data_u_color = "#22A4E6"
data_u_decoration_color = "#22A4E6"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(34, 164, 230, 0.06)"

