# Catppuccin — Latte (亮色) / Mocha (暗色)
# 官方调色板: https://catppuccin.com/palette/

name = "Catppuccin"

[light]
# 页面
page_bg = "#eff1f5"
page_color = "#4c4f69"
heading_color = "#8839ef"
date_color = "#8839ef"
# 横幅
banner_bg = "#e6e9ef"
banner_color = "#4c4f69"
banner_close_color = "#6c6f85"
banner_border = "#ccd0da"
# 徽章
badge_bg = "#8839ef"
badge_color = "#eff1f5"
# 容器
container_bg = "rgba(236, 239, 245, 0.85)"
container_shadow = "0 4px 24px rgba(136, 57, 239, 0.06)"
container_border = "#ccd0da"
# 信息框
infobox_bg = "#e6e9ef"
infobox_color = "#4c4f69"
infobox_border = "#bcc0cc"
# 信息文本
info_color = "#6c6f85"
# Tab 栏
tabbar_bg = "#e6e9ef"
tabbar_border = "#ccd0da"
# Tab 按钮
tab_color = "#6c6f85"
tab_hover_color = "#8839ef"
tab_hover_bg = "#ccd0da"
tab_active_bg = "#eff1f5"
tab_active_color = "#8839ef"
tab_active_border = "#8839ef"
tab_border = "#ccd0da"
# 日期切换按钮
date_btn_color = "#8839ef"
date_btn_hover_bg = "#ccd0da"
# 时段标题
timeslot_color = "#8839ef"
# 表格
table_border = "#ccd0da"
table_header_bg = "#e6e9ef"
table_header_color = "#4c4f69"
floor_bg = "#ccd0da"
floor_color = "#8839ef"
building_bg = "#ccd0da"
building_color = "#8839ef"
# 折叠面板
collapsible_color = "#4c4f69"
collapsible_border = "#ccd0da"
collapsible_desc_color = "#6c6f85"
collapsible_desc_border = "#ccd0da"
# 主题控制按钮
theme_btn_color = "#6c6f85"
theme_btn_hover_bg = "#ccd0da"
theme_btn_border = "#bcc0cc"
theme_btn_hover_border = "#8839ef"
theme_name_color = "#6c6f85"
# 分割线
hr_border = "#ccd0da"
# 链接
link_color = "#1e66f5"
# 数据单元格
data_color = "#5c5f77"
data_bg = "rgba(136, 57, 239, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#40a02b"
data_strong_bg = "rgba(64, 160, 43, 0.08)"
# 删除线 — Red
data_del_color = "#d20f39"
data_del_decoration_color = "#d20f39"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(210, 15, 57, 0.06)"
# 下划线 — Blue
data_u_color = "#1e66f5"
data_u_decoration_color = "#1e66f5"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(30, 102, 245, 0.06)"

