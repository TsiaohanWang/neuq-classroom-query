# Gruvbox — Light (亮色) / Dark (暗色)
# 官方调色板: https://github.com/morhetz/gruvbox

name = "Gruvbox"

[light]
# 页面
page_bg = "#fbf1c7"
page_color = "#3c3836"
heading_color = "#076678"
date_color = "#076678"
# 横幅
banner_bg = "#ebdbb2"
banner_color = "#3c3836"
banner_close_color = "#665c54"
banner_border = "#d5c4a1"
# 徽章
badge_bg = "#076678"
badge_color = "#fbf1c7"
# 容器
container_bg = "rgba(251, 241, 199, 0.85)"
container_shadow = "0 4px 24px rgba(7, 102, 120, 0.06)"
container_border = "#d5c4a1"
# 信息框
infobox_bg = "#ebdbb2"
infobox_color = "#3c3836"
infobox_border = "#d5c4a1"
# 信息文本
info_color = "#665c54"
# Tab 栏
tabbar_bg = "#ebdbb2"
tabbar_border = "#d5c4a1"
# Tab 按钮
tab_color = "#665c54"
tab_hover_color = "#076678"
tab_hover_bg = "#d5c4a1"
tab_active_bg = "#fbf1c7"
tab_active_color = "#076678"
tab_active_border = "#076678"
tab_border = "#d5c4a1"
# 日期切换按钮
date_btn_color = "#076678"
date_btn_hover_bg = "#d5c4a1"
# 时段标题
timeslot_color = "#076678"
# 表格
table_border = "#d5c4a1"
table_header_bg = "#ebdbb2"
table_header_color = "#3c3836"
floor_bg = "#d5c4a1"
floor_color = "#076678"
building_bg = "#d5c4a1"
building_color = "#076678"
# 折叠面板
collapsible_color = "#3c3836"
collapsible_border = "#d5c4a1"
collapsible_desc_color = "#665c54"
collapsible_desc_border = "#d5c4a1"
# 主题控制按钮
theme_btn_color = "#665c54"
theme_btn_hover_bg = "#d5c4a1"
theme_btn_border = "#bdae93"
theme_btn_hover_border = "#076678"
theme_name_color = "#665c54"
# 分割线
hr_border = "#d5c4a1"
# 链接
link_color = "#076678"
# 数据单元格
data_color = "#504945"
data_bg = "rgba(7, 102, 120, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#79740e"
data_strong_bg = "rgba(121, 116, 14, 0.08)"
# 删除线 — Red
data_del_color = "#9d0006"
data_del_decoration_color = "#9d0006"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(157, 0, 6, 0.06)"
# 下划线 — Aqua
data_u_color = "#427b58"
data_u_decoration_color = "#427b58"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(66, 123, 88, 0.06)"

