collapsible_desc_border = "#2A2A37"
# 主题控制按钮
theme_btn_color = "#C8C093"
theme_btn_hover_bg = "#2A2A37"
theme_btn_border = "#363646"
theme_btn_hover_border = "#7E9CD8"
