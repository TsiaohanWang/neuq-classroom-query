# Kanagawa — Lotus (亮色) / Wave (暗色)
# 官方调色板: https://github.com/rebelot/kanagawa.nvim

name = "Kanagawa"

[light]
# 页面
page_bg = "#f2ecbc"
page_color = "#545464"
heading_color = "#4d699b"
date_color = "#4d699b"
# 横幅
banner_bg = "#e5ddb0"
banner_color = "#545464"
banner_close_color = "#716e61"
banner_border = "#d5cea3"
# 徽章
badge_bg = "#4d699b"
badge_color = "#f2ecbc"
# 容器
container_bg = "rgba(242, 236, 188, 0.85)"
container_shadow = "0 4px 24px rgba(77, 105, 155, 0.06)"
container_border = "#d5cea3"
# 信息框
infobox_bg = "#e5ddb0"
infobox_color = "#545464"
infobox_border = "#d5cea3"
# 信息文本
info_color = "#716e61"
# Tab 栏
tabbar_bg = "#e5ddb0"
tabbar_border = "#d5cea3"
# Tab 按钮
tab_color = "#716e61"
tab_hover_color = "#4d699b"
tab_hover_bg = "#d5cea3"
tab_active_bg = "#f2ecbc"
tab_active_color = "#4d699b"
tab_active_border = "#4d699b"
tab_border = "#d5cea3"
# 日期切换按钮
date_btn_color = "#4d699b"
date_btn_hover_bg = "#d5cea3"
# 时段标题
timeslot_color = "#4d699b"
# 表格
table_border = "#d5cea3"
table_header_bg = "#e5ddb0"
table_header_color = "#545464"
floor_bg = "#d5cea3"
floor_color = "#4d699b"
building_bg = "#d5cea3"
building_color = "#4d699b"
# 折叠面板
collapsible_color = "#545464"
collapsible_border = "#d5cea3"
collapsible_desc_color = "#716e61"
collapsible_desc_border = "#d5cea3"
# 主题控制按钮
theme_btn_color = "#716e61"
theme_btn_hover_bg = "#d5cea3"
theme_btn_border = "#d5cea3"
theme_btn_hover_border = "#4d699b"
theme_name_color = "#716e61"
# 分割线
hr_border = "#d5cea3"
# 链接
link_color = "#4d699b"
# 数据单元格
data_color = "#43436c"
data_bg = "rgba(77, 105, 155, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#6f894e"
data_strong_bg = "rgba(111, 137, 78, 0.08)"
# 删除线 — Red
data_del_color = "#c84053"
data_del_decoration_color = "#c84053"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(200, 64, 83, 0.06)"
# 下划线 — Teal
data_u_color = "#4e8ca2"
data_u_decoration_color = "#4e8ca2"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(78, 140, 162, 0.06)"

[dark]
