# Tokyo Night — Light (亮色) / Storm (暗色)
# 官方调色板: https://wixdaq.github.io/Tokyo-Night-Website/palette.html

name = "Tokyo Night"

[light]
# 页面
page_bg = "#e1e2e7"
page_color = "#485874"
heading_color = "#2e7de9"
date_color = "#2e7de9"
# 横幅
banner_bg = "#d5d6db"
banner_color = "#485874"
banner_close_color = "#68709a"
banner_border = "#d5d6db"
# 徽章
badge_bg = "#2e7de9"
badge_color = "#e1e2e7"
# 容器
container_bg = "rgba(225, 226, 231, 0.85)"
container_shadow = "0 4px 24px rgba(46, 125, 233, 0.06)"
container_border = "#d5d6db"
# 信息框
infobox_bg = "#d5d6db"
infobox_color = "#485874"
infobox_border = "#d5d6db"
# 信息文本
info_color = "#68709a"
# Tab 栏
tabbar_bg = "#d5d6db"
tabbar_border = "#d5d6db"
# Tab 按钮
tab_color = "#68709a"
tab_hover_color = "#2e7de9"
tab_hover_bg = "#d5d6db"
tab_active_bg = "#e1e2e7"
tab_active_color = "#2e7de9"
tab_active_border = "#2e7de9"
tab_border = "#d5d6db"
# 日期切换按钮
date_btn_color = "#2e7de9"
date_btn_hover_bg = "#d5d6db"
# 时段标题
timeslot_color = "#2e7de9"
# 表格
table_border = "#d5d6db"
table_header_bg = "#d5d6db"
table_header_color = "#485874"
floor_bg = "#d5d6db"
floor_color = "#2e7de9"
building_bg = "#d5d6db"
building_color = "#2e7de9"
# 折叠面板
collapsible_color = "#485874"
collapsible_border = "#d5d6db"
collapsible_desc_color = "#68709a"
collapsible_desc_border = "#d5d6db"
# 主题控制按钮
theme_btn_color = "#68709a"
theme_btn_hover_bg = "#d5d6db"
theme_btn_border = "#d5d6db"
theme_btn_hover_border = "#2e7de9"
theme_name_color = "#68709a"
# 分割线
hr_border = "#d5d6db"
# 链接
link_color = "#2e7de9"
# 数据单元格
data_color = "#3760bf"
data_bg = "rgba(46, 125, 233, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#587539"
data_strong_bg = "rgba(88, 117, 57, 0.08)"
# 删除线 — Red
data_del_color = "#8c4351"
data_del_decoration_color = "#8c4351"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(140, 67, 81, 0.06)"
# 下划线 — Blue
data_u_color = "#2e7de9"
data_u_decoration_color = "#2e7de9"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(46, 125, 233, 0.06)"

