# Everforest — Light medium (亮色) / Dark medium (暗色)
# 官方调色板: https://everforest.vercel.app/palette

name = "Everforest"

[light]
# 页面
page_bg = "#fdf6e3"
page_color = "#5c6a72"
heading_color = "#3a94c5"
date_color = "#3a94c5"
# 横幅
banner_bg = "#f4f0d9"
banner_color = "#5c6a72"
banner_close_color = "#829181"
banner_border = "#e6e2cc"
# 徽章
badge_bg = "#3a94c5"
badge_color = "#fdf6e3"
# 容器
container_bg = "rgba(253, 246, 227, 0.85)"
container_shadow = "0 4px 24px rgba(58, 148, 197, 0.06)"
container_border = "#e6e2cc"
# 信息框
infobox_bg = "#f4f0d9"
infobox_color = "#5c6a72"
infobox_border = "#e0dcc7"
# 信息文本
info_color = "#939f91"
# Tab 栏
tabbar_bg = "#f4f0d9"
tabbar_border = "#e6e2cc"
# Tab 按钮
tab_color = "#829181"
tab_hover_color = "#3a94c5"
tab_hover_bg = "#e6e2cc"
tab_active_bg = "#fdf6e3"
tab_active_color = "#3a94c5"
tab_active_border = "#3a94c5"
tab_border = "#e6e2cc"
# 日期切换按钮
date_btn_color = "#3a94c5"
date_btn_hover_bg = "#e6e2cc"
# 时段标题
timeslot_color = "#3a94c5"
# 表格
table_border = "#e0dcc7"
table_header_bg = "#efebd4"
table_header_color = "#5c6a72"
floor_bg = "#e6e2cc"
floor_color = "#3a94c5"
building_bg = "#e6e2cc"
building_color = "#3a94c5"
# 折叠面板
collapsible_color = "#5c6a72"
collapsible_border = "#e0dcc7"
collapsible_desc_color = "#829181"
collapsible_desc_border = "#e0dcc7"
# 主题控制按钮
theme_btn_color = "#829181"
theme_btn_hover_bg = "#e6e2cc"
theme_btn_border = "#e0dcc7"
theme_btn_hover_border = "#3a94c5"
theme_name_color = "#829181"
# 分割线
hr_border = "#e0dcc7"
# 链接
link_color = "#3a94c5"
# 数据单元格
data_color = "#5c6a72"
data_bg = "rgba(58, 148, 197, 0.04)"
# 加粗（全天空闲）— Green
data_strong_color = "#8da101"
data_strong_bg = "rgba(141, 161, 1, 0.08)"
# 删除线 — Red
data_del_color = "#f85552"
data_del_decoration_color = "#f85552"
data_del_decoration_style = "solid"
data_del_decoration_thickness = "1px"
data_del_bg = "rgba(248, 85, 82, 0.06)"
# 下划线 — Aqua
data_u_color = "#35a77c"
data_u_decoration_color = "#35a77c"
data_u_decoration_style = "solid"
data_u_decoration_thickness = "1.25px"
data_u_bg = "rgba(53, 167, 124, 0.06)"

